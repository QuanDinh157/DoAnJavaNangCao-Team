<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Thanh Toán | TEA & CAKE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .checkout-hero { padding: 40px 0; background: #f8f9fa; margin-bottom: 30px; }
        .checkout-box { background: #fff; border: 1px solid #edf2f7; border-radius: 8px; padding: 30px; }
        .order-summary { background: #fdfbf7; border: 1px solid #e2e8f0; border-radius: 8px; padding: 25px; }
        .btn-confirm { background: #CC4B14; color: #fff; padding: 12px; width: 100%; border: none; font-weight: bold; border-radius: 6px; margin-top: 20px;}
        .btn-confirm:hover { background: #A0360B; }
    </style>
</head>
<body>

<div th:replace="~{index :: .main-header}"></div>

<div class="checkout-hero text-center">
    <h2>XÁC NHẬN ĐƠN HÀNG</h2>
    <p>Vui lòng điền thông tin giao hàng bên dưới</p>
</div>

<div class="container mb-5">
    <div class="row">
        <div class="col-md-7 mb-4">
            <div class="checkout-box">
                <h4 class="mb-4">Thông tin nhận hàng</h4>
                <form th:action="@{/checkout}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và tên người nhận (*)</label>
                        <input type="text" name="customerName" class="form-control" required th:value="${savedName}" placeholder="Nhập họ và tên...">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Số điện thoại (*)</label>
                            <input type="text" name="phone" class="form-control" required th:value="${savedPhone}" placeholder="Nhập số điện thoại...">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" class="form-control" th:value="${savedEmail}" placeholder="Email nhận biên lai...">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Địa chỉ giao hàng (*)</label>
                        <textarea name="address" class="form-control" rows="3" required placeholder="Số nhà, tên đường, phường/xã, quận/huyện..."></textarea>
                    </div>

                    <button type="submit" class="btn-confirm">XÁC NHẬN ĐẶT HÀNG</button>
                    <a href="/cart" class="d-block text-center mt-3 text-secondary text-decoration-none"><i class="fa-solid fa-arrow-left"></i> Quay lại giỏ hàng</a>
                </form>
            </div>
        </div>

        <div class="col-md-5">
            <div class="order-summary">
                <h4 class="mb-4">Tóm tắt đơn hàng</h4>
                <div th:each="entry : ${cartItems}" class="d-flex justify-content-between mb-3 border-bottom pb-2">
                    <div>
                        <span class="fw-bold" th:text="${entry.value.name}">Tên bánh</span>
                        <div class="text-muted" style="font-size: 0.85rem;">Số lượng: x<span th:text="${entry.value.quantity}"></span></div>
                    </div>
                    <div class="fw-bold text-danger" th:text="${#numbers.formatDecimal(entry.value.price * entry.value.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <h5 class="fw-bold">TỔNG CỘNG:</h5>
                    <h4 class="fw-bold text-danger" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h4>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{index :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
