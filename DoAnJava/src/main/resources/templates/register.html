<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - TEA & CAKE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="auth-card">
        <a th:href="@{/}" class="back-home-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left-short" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5z"/>
            </svg>
            Trang chủ
        </a>

        <h3 class="auth-title">ĐĂNG KÝ TÀI KHOẢN</h3>

        <div th:if="${error}" class="alert alert-danger text-center" role="alert" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${user}" method="POST">
            <div class="form-group mb-3">
                <label class="form-label">Tên tài khoản (Username)</label>
                <input type="text" th:field="*{username}" class="form-control" required placeholder="Nhập tên tài khoản...">
            </div>

            <div class="form-group mb-3">
                <label class="form-label">Họ và tên</label>
                <input type="text" th:field="*{fullName}" class="form-control" required placeholder="Nhập họ và tên...">
            </div>

            <div class="form-group mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required placeholder="example@gmail.com">
            </div>

            <div class="form-group mb-3">
                <label class="form-label">Ngày sinh</label>
                <input type="date" th:field="*{birthday}" class="form-control" required>
            </div>

            <div class="form-group mb-4">
                <label class="form-label">Mật khẩu</label>
                <input type="password" th:field="*{password}" class="form-control" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-auth mb-3">ĐĂNG KÝ</button>

            <div class="text-center auth-footer">
                <span class="text-muted">Đã có tài khoản? </span>
                <a th:href="@{/login}">Đăng nhập ngay</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
