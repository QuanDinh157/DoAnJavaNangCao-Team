<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - TEA & CAKE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="auth-card">
        <a th:href="@{/}" class="back-home-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left-short" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5z"/>
            </svg>
            Trang chủ
        </a>

        <h3 class="auth-title">ĐĂNG NHẬP</h3>

        <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
            Tên đăng nhập hoặc mật khẩu không đúng!
        </div>
        <div th:if="${param.logout}" class="alert alert-success text-center" role="alert">
            Bạn đã đăng xuất thành công!
        </div>

        <form th:action="@{/login}" method="POST">
            <div class="form-group mb-3">
                <label class="form-label">Tên tài khoản</label>
                <input type="text" name="username" class="form-control" required placeholder="Nhập tên tài khoản của bạn...">
            </div>

            <div class="form-group mb-4">
                <label class="form-label">Mật khẩu</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-auth mb-3">ĐĂNG NHẬP</button>

            <div class="text-center auth-footer">
                <span class="text-muted">Chưa có tài khoản? </span>
                <a th:href="@{/register}">Đăng ký tài khoản</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
