<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<!--/*@thymesVar id="product" type="com.example.DoAnJava.entity.Product"*/-->
<!--/*@thymesVar id="categories" type="java.util.List<com.example.DoAnJava.entity.Category>"*/-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Form</title>
    <link th:href="@{/css/product-form.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">Product Form</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/products/save}" method="POST" enctype="multipart/form-data" th:object="${product}">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Product Name</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" required>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label fw-bold">Category</label>
                            <select class="form-select" id="category" name="categoryId" required>
                                <option value="" disabled>-- Select Category --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"
                                        th:selected="${product.category != null and product.category.id == cat.id}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label fw-bold">Price (VND)</label>
                            <input type="number" class="form-control" id="price" th:field="*{price}" required>
                        </div>

                        <div class="mb-3">
                            <label for="imageFile" class="form-label fw-bold">Product Image</label>
                            <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*" onchange="previewImage(event)">
                            <div class="mt-3">
                                <img th:if="${product.imageUrl != null}"
                                     th:src="@{'/images/' + ${product.imageUrl}}"
                                     id="currentImage"
                                     alt="Current Product Image"
                                     style="max-width: 150px; border-radius: 8px; border: 1px dashed #ccc; padding: 5px;">
                                <img id="imagePreview"
                                     src="#"
                                     alt="Preview Image"
                                     style="max-width: 150px; display: none; border-radius: 8px; border: 1px dashed #ccc; padding: 5px;">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label fw-bold">Description</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="4"></textarea>
                        </div>

                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" id="hot" th:field="*{isHot}">
                            <label class="form-check-label" for="hot">Mark as HOT</label>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/admin/products" class="btn btn-outline-secondary">Back to List</a>
                            <button type="submit" class="btn btn-primary">Save Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function previewImage(event) {
        const output = document.getElementById('imagePreview');
        const current = document.getElementById('currentImage');
        if(current) current.style.display = 'none';
        output.src = URL.createObjectURL(event.target.files[0]);
        output.style.display = 'block';
    }
</script>
</body>
</html>
