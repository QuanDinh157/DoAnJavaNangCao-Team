<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{admin/layout :: layout(~{::div.content-body})}">
    <div class="content-body">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Quản lý danh mục</h2>
            <a href="/admin/categories/add" class="btn btn-success">Thêm danh mục</a>
        </div>
        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Tên danh mục</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cat : ${categories}">
                        <td th:text="${cat.id}"></td>
                        <td th:text="${cat.name}"></td>
                        <td>
                            <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}" class="btn btn-warning btn-sm">Sửa</a>
                            <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
