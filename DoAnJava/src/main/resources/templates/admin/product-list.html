<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{admin/layout :: layout(~{::div.content-body})}">
    <div class="content-body">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Quản lý sản phẩm</h2>
            <a th:href="@{/admin/products/add}" class="btn btn-success">Add Product</a>
        </div>
        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="prod : ${products}">
                        <td th:text="${prod.id}"></td>
                        <td><img th:src="${prod.imageUrl}" class="img-thumbnail" style="width: 60px; height: 60px; object-fit: cover;"></td>
                        <td><strong th:text="${prod.name}"></strong></td>
                        <td th:text="${prod.category != null} ? ${prod.category.name} : 'None'"></td>
                        <td class="text-danger fw-bold" th:text="${prod.price} + ' VND'"></td>
                        <td>
                            <a th:href="@{/admin/products/edit/{id}(id=${prod.id})}" class="btn btn-warning btn-sm">Edit</a>
                            <a th:href="@{/admin/products/delete/{id}(id=${prod.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Delete?')">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
