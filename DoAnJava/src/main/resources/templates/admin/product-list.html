<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Product Management</title>
    <link th:href="@{/css/product-list.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Admin Dashboard</h2>
        <div>
            <a th:href="@{/}" class="btn btn-outline-secondary">Home</a>
            <a th:href="@{/admin/categories}" class="btn btn-outline-primary">Category Management</a>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Product List</h5>
            <a th:href="@{/admin/products/add}" class="btn btn-success btn-sm">Add Product</a>
        </div>
        <div class="card-body">
            <table class="table table-hover table-bordered align-middle">
                <thead class="table-light">
                <tr>
                    <th style="width: 10%">ID</th>
                    <th style="width: 15%">Image</th>
                    <th style="width: 25%">Product Name</th>
                    <th style="width: 15%">Category</th>
                    <th style="width: 15%">Price</th>
                    <th style="width: 20%" class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="prod : ${products}">
                    <td th:text="${prod.id}">ID</td>
                    <td>
                        <img th:if="${prod.imageUrl != null}"
                             th:src="@{'/images/' + ${prod.imageUrl}}"
                             class="img-thumbnail" style="width: 80px; height: 80px; object-fit: cover;" alt="Product Image">

                        <img th:unless="${prod.imageUrl != null}"
                             th:src="@{/images/default.jpg}"
                             class="img-thumbnail" style="width: 80px; height: 80px; object-fit: cover;" alt="Default Image">
                    </td>
                    <td>
                        <strong th:text="${prod.name}">Product Name</strong>
                    </td>
                    <td th:text="${prod.category != null} ? ${prod.category.name} : 'None'">Category</td>
                    <td class="text-danger fw-bold" th:text="${prod.price} + ' VND'">0 VND</td>
                    <td class="text-center">
                        <a th:href="@{/admin/products/edit/{id}(id=${prod.id})}" class="btn btn-warning btn-sm me-2">Edit</a>
                        <a th:href="@{/admin/products/delete/{id}(id=${prod.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this product?')">Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="6" class="text-center text-muted py-4">No products found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
