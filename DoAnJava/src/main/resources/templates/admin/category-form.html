<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{admin/layout :: layout(~{::div.content-body})}">
    <div class="content-body">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white"><h4>Danh mục</h4></div>
                    <div class="card-body">
                        <form th:action="@{/admin/categories/save}" method="POST" th:object="${category}">
                            <input type="hidden" th:field="*{id}">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên danh mục</label>
                                <input type="text" class="form-control" th:field="*{name}" required>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="/admin/categories" class="btn btn-secondary">Quay lại</a>
                                <button type="submit" class="btn btn-primary">Lưu danh mục</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
